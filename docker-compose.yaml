name: chatapp-stack
services:
  postgres:
    image: postgres:latest
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: postgress
      POSTGRES_PASSWORD: postgress

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: