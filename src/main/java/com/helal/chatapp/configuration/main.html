<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Spring WebSocket Test</title>

    <!-- SockJS -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

    <!-- STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background:#f4f4f4;
        }

        h2{
            color:#333;
        }

        .box{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:10px;
            font-size:16px;
        }

        button{
            padding:10px 18px;
            border:none;
            background:#007bff;
            color:white;
            border-radius:6px;
            cursor:pointer;
            margin-right:10px;
        }

        button:hover{
            background:#0056b3;
        }

        #messages{
            height:300px;
            overflow:auto;
            background:#111;
            color:#0f0;
            padding:10px;
            font-family: monospace;
            border-radius:8px;
        }

        .status{
            font-weight:bold;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<h2>Spring Boot WebSocket Broker Tester</h2>

<div class="box">
    <label>WebSocket Endpoint</label>
    <input id="endpoint" value="http://localhost:8080/ws"/>

    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>

    <div class="status" id="status">Disconnected</div>
</div>

<div class="box">
    <label>Subscribe Topic</label>
    <input id="topic" value="/topic/messages"/>

    <button onclick="subscribeTopic()">Subscribe</button>
</div>

<div class="box">
    <label>Send Destination</label>
    <input id="destination" value="/app/chat"/>

    <label>Message</label>
    <input id="message" value="Hello Spring"/>

    <button onclick="sendMessage()">Send</button>
</div>

<div class="box">
    <h3>Logs</h3>
    <div id="messages"></div>
</div>

<script>
    let stompClient = null;

    function log(msg){
        const box = document.getElementById("messages");
        box.innerHTML += msg + "<br>";
        box.scrollTop = box.scrollHeight;
    }

    function setStatus(txt){
        document.getElementById("status").innerText = txt;
    }

    function connect(){
        const endpoint = document.getElementById("endpoint").value;

        const socket = new SockJS(endpoint);

        stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame){
            setStatus("Connected");
            log("CONNECTED");
            log(frame);
        }, function(error){
            setStatus("Connection Failed");
            log("ERROR: " + error);
        });
    }

    function disconnect(){
        if(stompClient){
            stompClient.disconnect(() => {
                setStatus("Disconnected");
                log("DISCONNECTED");
            });
        }
    }

    function subscribeTopic(){
        const topic = document.getElementById("topic").value;

        stompClient.subscribe(topic, function(message){
            log("RECEIVED: " + message.body);
        });

        log("SUBSCRIBED TO: " + topic);
    }

    function sendMessage(){
        const destination = document.getElementById("destination").value;
        const msg = document.getElementById("message").value;

        stompClient.send(destination, {}, msg);

        log("SENT TO " + destination + ": " + msg);
    }
</script>

</body>
</html>
